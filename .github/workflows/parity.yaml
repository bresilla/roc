name: parity

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths:
      - ".github/workflows/parity.yaml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - "RELEASE_GATE.md"
      - "COMPAT_VALIDATION.md"
      - "scripts/release_gate.sh"
      - "src/**"
      - "tests/**"

env:
  CARGO_TERM_COLOR: always
  ROC_VALIDATION_ROS2_EXAMPLES: /tmp/roc_ros2_examples
  ROC_VALIDATION_ROS2_DEMOS: /tmp/roc_ros2_demos

jobs:
  release-gate:
    name: release-gate
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up ROS 2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy
          install-connext: false

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            git \
            libclang-dev \
            libxml2-utils \
            pkg-config \
            python3-colcon-common-extensions \
            python3-pytest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare upstream validation workspaces
        run: |
          git clone --depth 1 --branch rolling https://github.com/ros2/examples.git "$ROC_VALIDATION_ROS2_EXAMPLES"
          git clone --depth 1 --branch rolling https://github.com/ros2/demos.git "$ROC_VALIDATION_ROS2_DEMOS"

      - name: Run parity release gate
        run: make release-gate
        shell: bash
