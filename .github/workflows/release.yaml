name: Release

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            ros_distro: humble
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            archive: tar.gz
            ros_distro: humble
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            ros_distro: humble
          - target: x86_64-apple-darwin
            os: macos-12
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-12
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: zip
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up ROS2 (Linux only)
        if: runner.os == 'Linux'
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.ros_distro }}
          install-connext: false
          
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt install -y build-essential clang libclang-dev pkg-config
          if [[ "${{ matrix.target }}" == *"musl"* ]]; then
            sudo apt install -y musl-tools
          fi
          if [[ "${{ matrix.target }}" == "aarch64"* ]]; then
            sudo apt install -y gcc-aarch64-linux-gnu
          fi
          
      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm pkg-config
          echo 'export PATH="/opt/homebrew/opt/llvm/bin:$PATH"' >> ~/.zshrc
          
      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install llvm
          
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Configure Cargo
        run: |
          mkdir -p ~/.cargo
          echo '[target.${{ matrix.target }}]' >> ~/.cargo/config.toml
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
          fi
        shell: bash
        
      - name: Build binary
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          fi
          cargo build --release --target ${{ matrix.target }} --locked
        shell: bash
        
      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/roc
          else
            strip target/${{ matrix.target }}/release/roc
          fi
        shell: bash
        
      - name: Create archive
        id: archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          ARCHIVE_NAME="roc-${VERSION}-${{ matrix.target }}"
          
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BINARY_PATH="target/${{ matrix.target }}/release/roc.exe"
            ARCHIVE_FILE="${ARCHIVE_NAME}.${{ matrix.archive }}"
            7z a "${ARCHIVE_FILE}" "${BINARY_PATH}"
          else
            BINARY_PATH="target/${{ matrix.target }}/release/roc"
            ARCHIVE_FILE="${ARCHIVE_NAME}.${{ matrix.archive }}"
            tar -czf "${ARCHIVE_FILE}" -C "target/${{ matrix.target }}/release" roc
          fi
          
          echo "archive_name=${ARCHIVE_NAME}" >> $GITHUB_OUTPUT
          echo "archive_file=${ARCHIVE_FILE}" >> $GITHUB_OUTPUT
        shell: bash
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.archive_name }}
          path: ${{ steps.archive.outputs.archive_file }}
          
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.archive.outputs.archive_file }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-22.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up ROS2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble
          install-connext: false
          
      - name: Install build dependencies
        run: |
          sudo apt install -y build-essential clang libclang-dev pkg-config
          
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        
      - name: Login to crates.io
        run: cargo login ${{ secrets.CRATES_TOKEN }}
        
      - name: Publish rclrs
        run: |
          source /opt/ros/humble/setup.bash
          cd rclrs
          cargo publish --allow-dirty || echo "rclrs may already be published"
          
      - name: Wait for rclrs propagation
        run: sleep 120
        
      - name: Publish roc
        run: |
          source /opt/ros/humble/setup.bash
          cargo publish --allow-dirty || echo "roc may already be published"