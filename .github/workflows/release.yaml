name: Release

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
        
      - name: Set up ROS2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy
          install-connext: false
          
      - name: Install build dependencies
        run: |
          sudo apt install -y build-essential clang libclang-dev pkg-config
          
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build binary
        run: |
          source /opt/ros/jazzy/setup.bash
          cargo build --release
        shell: bash
        
      - name: Strip binary
        run: |
          strip target/release/roc
        shell: bash
        
      - name: Create archive
        id: archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          ARCHIVE_NAME="roc-${VERSION}-x86_64-unknown-linux-gnu"
          BINARY_PATH="target/release/roc"
          ARCHIVE_FILE="${ARCHIVE_NAME}.tar.gz"
          tar -czf "${ARCHIVE_FILE}" -C "target/release" roc
          
          echo "archive_name=${ARCHIVE_NAME}" >> $GITHUB_OUTPUT
          echo "archive_file=${ARCHIVE_FILE}" >> $GITHUB_OUTPUT
        shell: bash
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.archive_name }}
          path: ${{ steps.archive.outputs.archive_file }}
          
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.archive.outputs.archive_file }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
        
      - name: Set up ROS2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy
          install-connext: false
          
      - name: Install build dependencies
        run: |
          sudo apt install -y build-essential clang libclang-dev pkg-config
          
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        
      - name: Login to crates.io
        run: cargo login ${{ secrets.CRATES_TOKEN }}
        
      - name: Publish rclrs
        run: |
          source /opt/ros/jazzy/setup.bash
          cd deps/ros2_rust/rclrs
          cargo publish --allow-dirty || echo "rclrs may already be published"
          
      - name: Wait for rclrs propagation
        run: sleep 120
        
      - name: Publish roc
        run: |
          source /opt/ros/jazzy/setup.bash
          cargo publish --allow-dirty || echo "roc may already be published"
